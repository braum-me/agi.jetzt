name: Validate Data & Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Data Integrity + Build
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout (with history for delta-check)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate data files
        id: validate
        run: pnpm run validate

      - name: Build site (must compile cleanly)
        run: pnpm build

      - name: Check dist output size
        run: |
          echo "dist size: $(du -sh dist/ | cut -f1)"
          echo "briefings built: $(ls dist/briefing/ | grep -c '^kw-' || echo 0)"
          echo "og images: $(find dist/og -name '*.png' | wc -l)"
