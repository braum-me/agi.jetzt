<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-gradient" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#faf6ed"/>
      <stop offset="70%" stop-color="#f5f1e8"/>
      <stop offset="100%" stop-color="#ede7d6"/>
    </radialGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d2670"/>
      <stop offset="50%" stop-color="#5b3aa3"/>
      <stop offset="100%" stop-color="#8b2c4d"/>
    </linearGradient>
    <radialGradient id="accent-glow" cx="80%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  <circle cx="950" cy="480" r="300" fill="url(#accent-glow)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#5b3aa3" stroke-width="1">
    <path d="M0,100 H1200"/><path d="M0,200 H1200"/><path d="M0,300 H1200"/><path d="M0,400 H1200"/><path d="M0,500 H1200"/>
    <path d="M150,0 V630"/><path d="M300,0 V630"/><path d="M450,0 V630"/><path d="M600,0 V630"/><path d="M750,0 V630"/><path d="M900,0 V630"/><path d="M1050,0 V630"/>
  </g>

  <!-- Brand mark -->
  <g transform="translate(80, 80)">
    <circle cx="20" cy="20" r="20" fill="#1a1814"/>
    <text x="20" y="27" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#faf6ed">◈</text>
    <text x="56" y="29" font-family="Georgia, serif" font-size="26" font-weight="400" fill="#1a1814">
      agi<tspan fill="#6b614f">.</tspan><tspan font-style="italic">jetzt</tspan>
    </text>
  </g>

  <!-- Live badge -->
  <g transform="translate(80, 150)">
    <rect x="0" y="0" rx="18" ry="18" width="260" height="36" fill="rgba(91, 58, 163, 0.1)" stroke="rgba(91, 58, 163, 0.3)" stroke-width="1"/>
    <circle cx="20" cy="18" r="4" fill="#5b3aa3"/>
    <text x="36" y="23" font-family="monospace" font-size="11" font-weight="500" fill="#5b3aa3" letter-spacing="2">
      RISIKO-RADAR · STAND 2026
    </text>
  </g>

  <!-- Title -->
  <g transform="translate(80, 225)">
    <text font-family="Georgia, serif" font-weight="400" font-size="78" fill="#0f0d0a">
      <tspan x="0" dy="0">Was uns Sorgen</tspan>
    </text>
    <text font-family="Georgia, serif" font-weight="400" font-style="italic" font-size="78" fill="url(#text-gradient)">
      <tspan x="0" dy="90">machen sollte</tspan>
    </text>
  </g>

  
  <!-- Big value -->
  <g transform="translate(900, 340)">
    <text font-family="Georgia, serif" font-weight="400" font-size="180" text-anchor="middle" fill="url(#text-gradient)" letter-spacing="-6">
      7.4
    </text>
    <text font-family="monospace" font-size="14" text-anchor="middle" fill="#6b614f" letter-spacing="3" y="30">
      RISK INDEX
    </text>
  </g>
  

  <!-- Subline -->
  <g transform="translate(80, 490)">
    <text font-family="sans-serif" font-weight="500" font-size="22" fill="#3a342a">
      Fünf Dimensionen, die über Segen oder Katastrophe entscheiden
    </text>
  </g>

  <!-- Author tag -->
  <g transform="translate(80, 555)">
    <text font-family="monospace" font-size="12" font-weight="500" fill="#6b614f" letter-spacing="3">
      RISK RADAR · AGI.JETZT
    </text>
  </g>
</svg>