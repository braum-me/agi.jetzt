server {
    listen 80;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip für Text-Assets (Coolify-Proxy macht zusätzlich brotli bei Bedarf)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/xml+rss application/atom+xml
        image/svg+xml application/manifest+json font/woff2;

    # Static-Site-Routing: echte 404 statt SPA-Fallback
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 404-Seite: Astro generiert /404.html, mit korrektem HTTP-Status ausliefern
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Fingerprinted Assets lange cachen
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }
    location ~* \.(woff2|svg|png|jpe?g|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # Security Headers — auf jede Response
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), browsing-topics=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header X-XSS-Protection "0" always;

    # Content Security Policy — strict, alles self-hosted (Fonts lokal).
    # Umami Analytics von analytics.jetzt.group explizit erlaubt.
    # 'unsafe-inline' für Astro-inline-scripts + Tailwind inline styles.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.jetzt.group; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self' https://analytics.jetzt.group; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';" always;

    # Dotfiles blocken (aber .well-known für Letsencrypt/etc. erlauben)
    location ~ /\.(?!well-known) {
        deny all;
    }
}
